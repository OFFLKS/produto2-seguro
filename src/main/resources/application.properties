# ============================================================
# CONFIGURAÇÕES SEGURAS - Locadora de Videogames (Produto 2)
# ============================================================

# Banco de Dados H2
spring.datasource.url=jdbc:h2:mem:locadoradb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# CORREÇÃO: Console H2 desabilitado em produção (expõe banco de dados)
spring.h2.console.enabled=false

# CORREÇÃO: Não expor informações detalhadas de erro na resposta HTTP
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# CORREÇÃO: Desabilitar banner informativo (não expor versão do framework)
spring.main.banner-mode=off

# Logging - sem dados sensíveis
logging.level.com.locadora=INFO
logging.level.org.springframework.security=WARN
